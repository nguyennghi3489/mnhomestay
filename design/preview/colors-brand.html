<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Brand palette</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:18px 22px;}
  .sw{height:108px;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px 12px;color:var(--linen);box-shadow:var(--shadow-1);}
  .sw .name{font-size:13px;font-weight:600;}
  .sw .hex{font-family:var(--font-mono);font-size:11px;opacity:.85;}
  .sw.light{color:var(--bark);}
</style>
</head>
<body class="hearth">
<div class="grid">
  <div class="sw" style="background:#2F4A3A"><div class="name">Forest</div><div class="hex">#2F4A3A</div></div>
  <div class="sw" style="background:#5C7A52"><div class="name">Moss</div><div class="hex">#5C7A52</div></div>
  <div class="sw light" style="background:#A8B89A"><div class="name">Sage</div><div class="hex">#A8B89A</div></div>
  <div class="sw" style="background:#C97B5B"><div class="name">Clay</div><div class="hex">#C97B5B</div></div>
  <div class="sw" style="background:#3A2E26"><div class="name">Bark</div><div class="hex">#3A2E26</div></div>
  <div class="sw light" style="background:#F5EFE3;border:1px solid var(--line-1);"><div class="name">Cream</div><div class="hex">#F5EFE3</div></div>
</div>
</body>
</html>
