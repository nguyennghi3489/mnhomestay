<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .wrap{padding:28px 24px;display:flex;gap:22px;align-items:center;}
  .b{width:120px;height:88px;background:var(--paper);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .b .n{font-size:12px;font-weight:600;color:var(--fg-1);}
  .b .v{font-family:var(--font-mono);font-size:10px;color:var(--fg-2);}
</style>
</head>
<body class="hearth">
<div class="wrap">
  <div class="b" style="box-shadow:var(--shadow-1)"><div class="n">Shadow 1</div><div class="v">rows / cells</div></div>
  <div class="b" style="box-shadow:var(--shadow-2)"><div class="n">Shadow 2</div><div class="v">cards</div></div>
  <div class="b" style="box-shadow:var(--shadow-3)"><div class="n">Shadow 3</div><div class="v">drawers</div></div>
  <div class="b" style="box-shadow:var(--shadow-4)"><div class="n">Shadow 4</div><div class="v">modals</div></div>
</div>
</body>
</html>
