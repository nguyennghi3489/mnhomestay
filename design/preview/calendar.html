<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Calendar cell</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .wrap{padding:18px;display:flex;flex-direction:column;gap:0;background:var(--bg-surface);margin:14px;border-radius:14px;overflow:hidden;border:1px solid var(--line-1);}
  .row{display:grid;grid-template-columns:140px repeat(7,1fr);align-items:stretch;}
  .head{font-size:11px;font-family:var(--font-mono);color:var(--fg-2);padding:8px;text-align:center;border-bottom:1px solid var(--line-1);}
  .room{padding:14px 12px;font-size:13px;font-weight:500;color:var(--fg-1);border-bottom:1px solid var(--line-1);background:var(--linen);}
  .cell{height:36px;border-right:1px solid var(--line-1);border-bottom:1px solid var(--line-1);position:relative;}
  .cell:last-child{border-right:none;}
  .booked{background:#5C7A52;color:var(--linen);font-size:11.5px;display:flex;align-items:center;padding-left:8px;font-weight:500;}
  .arriving{background:#C97B5B;color:var(--linen);font-size:11.5px;display:flex;align-items:center;padding-left:8px;font-weight:500;}
  .blocked{background:repeating-linear-gradient(45deg,#EFE8D9,#EFE8D9 6px,#E5DCC4 6px,#E5DCC4 12px);}
  .today{box-shadow:inset 0 0 0 2px var(--clay);}
</style>
</head>
<body class="hearth">
<div class="wrap">
  <div class="row">
    <div class="head" style="text-align:left;padding-left:12px;">Room</div>
    <div class="head">Mon</div><div class="head">Tue</div><div class="head">Wed</div><div class="head">Thu</div><div class="head">Fri</div><div class="head">Sat</div><div class="head">Sun</div>
  </div>
  <div class="row">
    <div class="room">Garden Suite</div>
    <div class="cell"></div>
    <div class="cell today arriving">Aanya I.</div>
    <div class="cell booked">→</div>
    <div class="cell booked">→</div>
    <div class="cell"></div>
    <div class="cell blocked"></div>
    <div class="cell blocked"></div>
  </div>
  <div class="row">
    <div class="room">The Loft</div>
    <div class="cell booked">Ravi M.</div>
    <div class="cell booked today">→</div>
    <div class="cell"></div>
    <div class="cell"></div>
    <div class="cell arriving">Sara K.</div>
    <div class="cell booked">→</div>
    <div class="cell booked">→</div>
  </div>
  <div class="row">
    <div class="room">Verandah Room</div>
    <div class="cell"></div>
    <div class="cell today"></div>
    <div class="cell"></div>
    <div class="cell arriving">Liu W.</div>
    <div class="cell booked">→</div>
    <div class="cell"></div>
    <div class="cell"></div>
  </div>
</div>
</body>
</html>
