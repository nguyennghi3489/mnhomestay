<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .wrap{padding:24px;display:flex;flex-wrap:wrap;gap:14px;align-items:center;}
  .btn{font-family:var(--font-body);font-size:14px;font-weight:600;padding:10px 18px;border-radius:10px;border:1px solid transparent;cursor:pointer;display:inline-flex;align-items:center;gap:8px;line-height:1;transition:all 180ms cubic-bezier(.32,.72,0,1);}
  .primary{background:var(--forest);color:var(--linen);box-shadow:var(--shadow-1),var(--shadow-inset-top);}
  .primary:hover{background:#3A5946;}
  .secondary{background:var(--linen);color:var(--bark);border-color:var(--line-2);}
  .secondary:hover{border-color:var(--moss);}
  .ghost{background:transparent;color:var(--moss);}
  .ghost:hover{background:rgba(92,122,82,.08);}
  .danger{background:transparent;color:var(--ember);border-color:rgba(184,74,46,.3);}
  .danger:hover{background:rgba(184,74,46,.06);}
  .clay{background:var(--clay);color:var(--linen);}
  .small{padding:6px 12px;font-size:12.5px;border-radius:8px;}
  .disabled{opacity:.4;pointer-events:none;}
</style>
</head>
<body class="hearth">
<div class="wrap">
  <button class="btn primary">Add booking</button>
  <button class="btn secondary">Save draft</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn clay">Check in guest</button>
  <button class="btn danger">Delete</button>
  <button class="btn primary disabled">Disabled</button>
  <button class="btn secondary small">Small</button>
</div>
</body>
</html>
