<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .wrap{padding:22px 26px;display:flex;flex-direction:column;gap:8px;}
  .row{display:flex;align-items:center;gap:14px;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);min-width:80px;}
  .bar{height:14px;background:var(--moss);border-radius:3px;}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
</style>
</head>
<body class="hearth">
<div class="wrap">
  <div class="row"><span class="tok">--space-1</span><span class="bar" style="width:4px"></span><span class="px">4 px</span></div>
  <div class="row"><span class="tok">--space-2</span><span class="bar" style="width:8px"></span><span class="px">8 px</span></div>
  <div class="row"><span class="tok">--space-3</span><span class="bar" style="width:12px"></span><span class="px">12 px</span></div>
  <div class="row"><span class="tok">--space-4</span><span class="bar" style="width:16px"></span><span class="px">16 px</span></div>
  <div class="row"><span class="tok">--space-6</span><span class="bar" style="width:24px"></span><span class="px">24 px · default card padding</span></div>
  <div class="row"><span class="tok">--space-8</span><span class="bar" style="width:32px"></span><span class="px">32 px · key surface padding</span></div>
  <div class="row"><span class="tok">--space-14</span><span class="bar" style="width:56px"></span><span class="px">56 px · table row height</span></div>
  <div class="row"><span class="tok">--space-24</span><span class="bar" style="width:96px"></span><span class="px">96 px · marketing rhythm</span></div>
</div>
</body>
</html>
