<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .wrap{padding:22px;display:flex;gap:14px;align-items:flex-end;}
  .b{width:90px;height:90px;background:var(--linen);border:1px solid var(--line-1);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .b .v{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
  .b .n{font-size:12px;font-weight:600;color:var(--fg-1);}
</style>
</head>
<body class="hearth">
<div class="wrap">
  <div class="b" style="border-radius:6px"><div class="n">sm</div><div class="v">6</div></div>
  <div class="b" style="border-radius:10px"><div class="n">md</div><div class="v">10</div></div>
  <div class="b" style="border-radius:16px"><div class="n">lg</div><div class="v">16</div></div>
  <div class="b" style="border-radius:24px"><div class="n">xl</div><div class="v">24</div></div>
  <div class="b" style="border-radius:32px"><div class="n">2xl</div><div class="v">32</div></div>
  <div class="b" style="border-radius:999px"><div class="n">pill</div><div class="v">999</div></div>
</div>
</body>
</html>
