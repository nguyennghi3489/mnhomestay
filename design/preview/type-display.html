<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Display type</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .wrap{padding:24px 28px;display:flex;flex-direction:column;gap:6px;}
  .l{display:flex;align-items:baseline;gap:18px;}
  .l .label{font-size:11px;color:var(--fg-2);font-family:var(--font-mono);min-width:64px;}
</style>
</head>
<body class="hearth">
<div class="wrap">
  <div class="l"><span class="label">5xl/64</span><span style="font-family:var(--font-display);font-size:60px;line-height:1;font-weight:500;letter-spacing:-0.02em;color:var(--forest);font-variation-settings:'opsz' 144;">Welcome home</span></div>
  <div class="l"><span class="label">4xl/48</span><span style="font-family:var(--font-display);font-size:42px;line-height:1.05;font-weight:500;letter-spacing:-0.02em;color:var(--bark);">Your morning</span></div>
  <div class="l"><span class="label">3xl/36</span><span style="font-family:var(--font-display);font-size:30px;line-height:1.1;font-weight:500;color:var(--bark);">Three arrivals today</span></div>
</div>
</body>
</html>
