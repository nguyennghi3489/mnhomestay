<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Logo</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:var(--bg-app);font-family:var(--font-body);}
  .card{padding:24px 28px;display:flex;align-items:center;gap:32px;height:152px;box-sizing:border-box;}
  .lockup{display:flex;align-items:center;gap:14px;}
  .lockup svg{display:block}
  .wordmark{font-family:var(--font-display);font-size:34px;font-weight:500;color:var(--forest);letter-spacing:-0.5px;}
  .meta{margin-left:auto;display:flex;flex-direction:column;gap:6px;}
  .meta .row{display:flex;gap:8px;align-items:center;font-size:12px;color:var(--fg-2);}
  .swatch{width:14px;height:14px;border-radius:3px;border:1px solid var(--line-1);}
  .alt{background:var(--forest);padding:14px 18px;border-radius:14px;}
  .alt .wordmark{color:var(--linen);}
</style>
</head>
<body class="hearth">
  <div class="card">
    <div class="lockup">
      <img src="../assets/logo-mark.svg" width="56" height="56" alt=""/>
      <span class="wordmark">Hearth</span>
    </div>
    <div class="alt lockup">
      <span class="wordmark">Hearth</span>
    </div>
    <div class="meta">
      <div class="row"><span class="swatch" style="background:var(--forest)"></span> Forest #2F4A3A</div>
      <div class="row"><span class="swatch" style="background:var(--cream)"></span> Cream #F5EFE3</div>
      <div class="row" style="font-family:var(--font-display);color:var(--fg-1)">Fraunces 500 · −0.5 tracking</div>
    </div>
  </div>
</body>
</html>
