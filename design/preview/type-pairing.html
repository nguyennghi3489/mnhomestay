<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Type pairing</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-app);font-family:var(--font-body);}
  .wrap{padding:28px;display:flex;gap:36px;align-items:center;}
  .left{flex:1;}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--moss);font-weight:600;margin-bottom:10px;}
  h1{font-family:var(--font-display);font-weight:500;font-size:36px;line-height:1.05;letter-spacing:-0.02em;color:var(--bark);margin:0 0 10px;}
  p{font-size:15px;line-height:24px;color:var(--fg-2);margin:0;max-width:46ch;}
  .right{font-family:var(--font-display);font-size:120px;font-weight:500;color:var(--forest);line-height:1;font-variation-settings:'opsz' 144;letter-spacing:-0.04em;}
</style>
</head>
<body class="hearth">
<div class="wrap">
  <div class="left">
    <div class="eyebrow">Today · Tue Apr 29</div>
    <h1>Three guests, two rooms turned, one quiet evening.</h1>
    <p>Fraunces sets the warmth. Inter handles the work. Together, they sound like a host who's been doing this a long time.</p>
  </div>
  <div class="right">Hh</div>
</div>
</body>
</html>
