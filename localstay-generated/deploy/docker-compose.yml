version: '3.8'

services:
  # LocalStay Backend API
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://localstay:password@db:5432/localstay
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-in-production}
      - FRONTEND_URL=http://localhost
    depends_on:
      - db
      - redis
    volumes:
      - ../backend:/app
      - /app/node_modules
      - /app/dist
    restart: unless-stopped

  # LocalStay Frontend
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=localstay
      - POSTGRES_USER=localstay
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - localstay_db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localstay"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for sessions/cache
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  localstay_db_data:

networks:
  default:
    name: localstay_network